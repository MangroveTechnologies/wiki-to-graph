      "title": "Attention Mechanism",
      "summary": "An attention mechanism maps a query and a set of key–value pairs to an output computed as a weighted sum of the values, where each weight reflects the compatibility of the query with the corresponding key. It lets a model focus on relevant parts of the input regardless of distance.",

      "title": "Compute-Optimal Scaling",
      "summary": "The principle, established by Chinchilla (Hoffmann et al., 2022), that under a fixed compute budget a transformer language model's parameter count and number of training tokens should be scaled **equally** — for every doubling of model size, double the training data.",
      "explanation": "Earlier scaling practice (embodied by GPT-3) grew parameters while holding data roughly constant, producing large but **undertrained** models. By training 400+ models from 70M to 16B parameters across 5–500B tokens, Chinchilla derived a compute-optimal frontier and confirmed it: a 70B compute-optimal model beats a 280B and even the 175B GPT-3. This refines — and partly corrects — the notion of Scale and Scaling, shifting it from *parameters-first* to *parameters-and-data-balanced*, and has direct consequences for Emergent Capabilities (they depend on training tokens, not just size).",

      "id": "foundation-models",
      "type": "concept",

      "title": "Foundation Models",
      "summary": "Coined by Stanford's CRFM (*On the Opportunities and Risks of Foundation Models*, 2021): a model trained on broad data at scale and adaptable to a wide range of downstream tasks. Examples given include BERT, DALL-E, and GPT-3.",
      "explanation": "The report names two defining properties: **emergence** (Emergent Capabilities arise from Scale and Scaling) and **Homogenization** (one model underlies many applications). Foundation models are built on standard deep learning, the Transformer, and Pre-training and Fine-tuning, but their scale changes their character. The report is explicitly sociotechnical, spanning capabilities, technical principles, applications (law, healthcare, education), and societal impact (inequity, misuse, environment). RLHF is one concrete technique for improving how such models serve users (Alignment).",

      "summary": "GPT-3 (*Language Models are Few-Shot Learners*, 2020) is a 175-billion-parameter **decoder-only** Autoregressive Language Model. Its central claim: scaling up language models yields strong task-agnostic Few-Shot Learning via In-Context Learning, often without any fine-tuning.",

      "id": "rlhf",
      "type": "concept",

      "title": "RLHF",
      "summary": "Reinforcement Learning from Human Feedback: the technique in *Training Language Models to Follow Instructions with Human Feedback* (2022) used to align GPT-3 into **InstructGPT**. It fine-tunes a model to follow user intent using human preference data.",
      "explanation": "RLHF is a three-step pipeline layered on a pre-trained model:\n1. **Supervised fine-tuning (SFT)** on labeler-written demonstrations.\n2. **Reward Modeling** — train a reward model to predict human rankings of outputs.\n3. **RL optimization** — fine-tune the policy against the reward model using Proximal Policy Optimization.\n\nThe goal is Alignment: making models helpful, honest, and harmless. It is a specialized form of Pre-training and Fine-tuning and the bridge from raw Foundation Models to modern assistants like ChatGPT.",

      "summary": "The step in RLHF where a model is trained to predict human preferences: given multiple model outputs for a prompt, it learns to score them consistent with human rankings, providing the reward signal for RL.",

      "id": "scale-and-scaling",

      "kind": "concept",
      "title": "Scale and Scaling",
      "summary": "The observation that increasing model size, data, and compute reliably improves language-model capability — a central theme connecting GPT-3 and Foundation Models.",
      "explanation": "GPT-3 operationalizes scaling: at 175B parameters it unlocks strong Few-Shot Learning and In-Context Learning not seen in smaller models. Foundation Models generalizes the point — scale is what produces Emergent Capabilities and drives Homogenization across applications. Scaling is a mechanism, not a guarantee of quality: RLHF shows that beyond a point, Alignment can matter more than additional parameters, and Chinchilla shows that *how* you scale matters — see Compute-Optimal Scaling.",

      "id": "scaled-dot-product-attention",
      "type": "concept",
      "kind": "schema",
      "title": "Scaled Dot-Product Attention",
      "summary": "The specific Attention Mechanism used in the Transformer: `Attention(Q, K, V) = softmax(QKᵀ / √dₖ) V`. Dot products of queries and keys are scaled by 1/√dₖ before the softmax.",
      "explanation": "The scaling factor 1/√dₖ is the key detail. For large key dimension dₖ, unscaled dot products grow large in magnitude, pushing the softmax into regions with vanishingly small gradients. Dividing by √dₖ keeps the softmax in a well-behaved range. Dot-product attention is preferred over additive attention because it can be implemented with highly optimized matrix multiplication, making it fast and memory-efficient. Multiple instances run in parallel form Multi-Head Attention; when Q, K, V share a source it becomes Self-Attention.",
      "sources": [
        "raw/01_attention_is_all_you_need.md (Vaswani et al., 2017)"

      "id": "self-attention",
      "type": "concept",
      "kind": "concept",
      "title": "Self-Attention",
      "summary": "Self-attention (intra-attention) is an Attention Mechanism where the queries, keys, and values all come from the same sequence, letting each position attend to every other position to build a context-aware representation.",
      "explanation": "Self-attention is the core computation of the Transformer. A self-attention layer connects all positions with O(1) sequential operations and a constant maximum path length, versus O(n) for recurrent layers — this is why Transformers parallelize well and capture long-range dependencies. In the decoder, self-attention is *masked* so a position can only attend to earlier positions, preserving the Autoregressive Language Model property used by GPT-3. BERT instead uses unmasked (bidirectional) self-attention. In practice it is realized as Multi-Head Attention over Scaled Dot-Product Attention.",

        "raw/01_attention_is_all_you_need.md (Vaswani et al., 2017)"

      "id": "transformer",
      "type": "concept",
      "kind": "schema",
      "title": "Transformer",
      "summary": "The Transformer is a neural network architecture based entirely on Attention Mechanism, dispensing with recurrence and convolution. Introduced in *Attention Is All You Need* (2017), it became the foundation for essentially all modern large language models.",
      "explanation": "The Transformer uses an Encoder-Decoder Architecture where each stack is built from repeated layers of Self-Attention and position-wise feed-forward networks, wrapped with residual connections and Layer Normalization. Because Self-Attention relates all positions in a sequence in a constant number of sequential operations, the Transformer is far more parallelizable than recurrent networks and better at learning long-range dependencies. Word order is supplied by Positional Encoding rather than recurrence. Its attention is computed via Scaled Dot-Product Attention and run in parallel across several Multi-Head Attention heads.\n\nLater architectures specialize the two halves: BERT keeps only the encoder for bidirectional understanding, while GPT-3 keeps only the decoder as an Autoregressive Language Model. These are the building blocks of Foundation Models.",

<script>
const G = JSON.parse(document.getElementById('data').textContent);
const KIND = {concept:'#4f7cff',schema:'#9b5cff',procedure:'#2ec27e',fact:'#f5a623'};
const TYPEN = {source:'#8a8f9a',index:'#d4a72c',log:'#6b7280'};
const EDGE = {mentions:'#5b6070',related:'#4f7cff',contradicts:'#e5484d',
              cites:'#7a7f8c',indexes:'#3f466b',records:'#3f466b'};
const nodeColor = n => KIND[n.kind] || TYPEN[n.type] || '#8a8f9a';

// default-visible edge types (hub edges off to reduce clutter)
const enabled = {mentions:true,related:true,contradicts:true,cites:false,indexes:false,records:false};

const svg = document.getElementById('svg'), NS='http://www.w3.org/2000/svg';
const byId = Object.fromEntries(G.nodes.map(n=>[n.id,n]));
let nodes = G.nodes.map(n=>({...n,x:Math.random()*800+100,y:Math.random()*600+80,vx:0,vy:0}));
let nIdx = Object.fromEntries(nodes.map((n,i)=>[n.id,i]));
const allEdges = G.links.map(e=>({...e}));
document.getElementById('count').textContent = G.nodes.length+' nodes · '+G.links.length+' edges';
let selected=null;

function visibleEdges(){ return allEdges.filter(e=>enabled[e.type] && nIdx[e.source]!=null && nIdx[e.target]!=null); }

// ---- edge-type toggles ----
const tog=document.getElementById('edgeToggles');
Object.keys(EDGE).forEach(t=>{
  const c=allEdges.filter(e=>e.type===t).length; if(!c) return;
  const lab=document.createElement('label'); lab.className='chip';
  lab.innerHTML=`<input type="checkbox" ${enabled[t]?'checked':''}> <span class="dot" style="background:${EDGE[t]}"></span>${t} (${c})`;
  lab.querySelector('input').onchange=e=>{enabled[t]=e.target.checked; sim(); draw();};
  tog.appendChild(lab);
});

// ---- legend ----
document.getElementById('legend').innerHTML =
  '<b>Node kind</b><br>'+Object.entries(KIND).map(([k,c])=>`<span class="dot" style="background:${c}"></span>${k}`).join('&nbsp; ')+
  '<br><span class="dot" style="background:#8a8f9a"></span>source &nbsp;<span class="dot" style="background:#d4a72c"></span>index/log'+
  '<br><br><b>Edge type</b> = color; toggle in top bar. Node size = degree.';

// ---- force layout ----
function sim(){
  const W=svg.clientWidth||900,H=svg.clientHeight||650, E=visibleEdges();
  const L=E.map(e=>[nIdx[e.source],nIdx[e.target]]);
  for(let it=0;it<220;it++){
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j];let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy+.01,d=Math.sqrt(d2);
      const f=2200/d2,fx=f*dx/d,fy=f*dy/d;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;}
    for(const [i,j] of L){const a=nodes[i],b=nodes[j];let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)+.01;
      const f=(d-90)*.02,fx=f*dx/d,fy=f*dy/d;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;}
    for(const n of nodes){n.x+=n.vx*.4;n.y+=n.vy*.4;n.vx*=.85;n.vy*=.85;
      n.x=Math.max(30,Math.min(W-30,n.x));n.y=Math.max(30,Math.min(H-30,n.y));}
  }
}
function neighborsOf(id){const s=new Set([id]);visibleEdges().forEach(e=>{if(e.source===id)s.add(e.target);if(e.target===id)s.add(e.source);});return s;}
function draw(){
  const E=visibleEdges();svg.innerHTML='';
  const near=selected?neighborsOf(selected):null;
  for(const e of E){const a=nodes[nIdx[e.source]],b=nodes[nIdx[e.target]];
    const l=document.createElementNS(NS,'line');
    l.setAttribute('x1',a.x);l.setAttribute('y1',a.y);l.setAttribute('x2',b.x);l.setAttribute('y2',b.y);
    l.setAttribute('stroke',EDGE[e.type]||'#444');
    l.setAttribute('stroke-width',Math.min(4,e.weight||1));
    if(e.type==='cites')l.setAttribute('stroke-dasharray','3,3');
    if(near&&!(near.has(e.source)&&near.has(e.target)))l.setAttribute('class','dim');
    svg.appendChild(l);}
  for(const n of nodes){
    const g=document.createElementNS(NS,'g');g.setAttribute('class','node'+(n.id===selected?' sel':'')+((near&&!near.has(n.id))?' dim':''));
    g.setAttribute('transform',`translate(${n.x},${n.y})`);g.onclick=()=>select(n.id);
    const r=4+Math.min(9,(n.in_degree||0)*0.5);
    const c=document.createElementNS(NS,'circle');c.setAttribute('r',r);c.setAttribute('fill',nodeColor(n));g.appendChild(c);
    const t=document.createElementNS(NS,'text');t.setAttribute('x',r+3);t.setAttribute('y',3);
    t.textContent=n.title.length>26?n.title.slice(0,24)+'…':n.title;g.appendChild(t);
    svg.appendChild(g);}
}
function select(id){
  selected=id;const n=byId[id];const s=document.getElementById('side');
  const col=nodeColor(n);
  const outs=(n.edges||[]).filter(e=>enabled[e.type]);
  s.innerHTML=`<h2>${n.title}</h2>`+
    (n.kind?`<span class="k" style="background:${col}">${n.kind}</span>`:`<span class="k" style="background:${col}">${n.type}</span>`)+
    `<div class="deg">in-degree ${n.in_degree||0} · out-degree ${n.out_degree||0}`+
      (n.n_sources!=null?` · ${n.n_sources} source(s)`:'')+`</div>`+
    (n.summary?`<p>${n.summary}</p>`:'')+
    `<h3>Outgoing edges (${outs.length})</h3>`+
    outs.map(e=>{const tg=byId[e.target];return `<div class="e" data-go="${e.target}">`+
      `<span class="et" style="background:${EDGE[e.type]||'#555'}">${e.type}</span>`+
      `${tg?tg.title:e.target}${e.weight>1?' ×'+e.weight:''}</div>`;}).join('')+
    `<h3>Backlinks</h3>`+
    (allEdges.filter(e=>e.target===id&&enabled[e.type]).map(e=>{const sr=byId[e.source];
      return `<div class="e" data-go="${e.source}"><span class="et" style="background:${EDGE[e.type]||'#555'}">${e.type}</span>${sr?sr.title:e.source}</div>`;}).join('')||'<p style="color:var(--muted);font-size:12px">none (with current filters)</p>');
  s.querySelectorAll('.e').forEach(el=>el.onclick=()=>select(el.dataset.go));
  draw();
}
document.getElementById('search').oninput=e=>{
  const q=e.target.value.toLowerCase().trim();if(!q)return;
  const hit=nodes.find(n=>n.title.toLowerCase().includes(q));if(hit)select(hit.id);
};
window.addEventListener('resize',()=>{sim();draw();});
sim();draw();
</script></body></html>
